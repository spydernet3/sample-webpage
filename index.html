<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Elements Demonstration</title>
</head>
<body>

    <!-- Headings 1 through 6 -->
    <h1>Heading Level 1</h1>
    <h2>Heading Level 2</h2>
    <h3>Heading Level 3</h3>
    <h4>Heading Level 4</h4>
    <h5>Heading Level 5</h5>
    <h6>Heading Level 6</h6>

    <!-- Image tag -->
    <img src="icon.png" alt="none image inside">
    <br>

    <!-- Anchor (href) tag -->
    <a href="https://www.example.com" target="_blank">Click here to visit Example.com</a>
    <br>

    <!-- Button tag -->
    <button type="button" onclick="alert('Button clicked!')">Just click Button</button>
    <br>
  
    <!-- Form -->
    <form action="/submit-endpoint" method="POST">
        <h3>Contact Form</h3>
        
        <label for="username">Name:</label>
        <input type="text" id="username" name="username" required>
        <br><br>
        
        <label for="useremail">Email:</label>
        <input type="email" id="useremail" name="useremail" required>
        <br><br>
        
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="30"></textarea>
        <br><br>
        
        <button type="submit">Submit Form</button>
    </form>

</body>
</html>
